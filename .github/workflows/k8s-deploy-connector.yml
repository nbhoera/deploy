name: k8s-deploy-connector

on:
  # Allow manual triggering of the workflow.
  workflow_call:
    inputs:
      FilePath:
        description: "The full path to the file to update."
        required: true
        type: string
      DockerImageName:
        description: "The name of the Docker image to update."
        required: true
        type: string
      ReleaseTag:
        description: "This parameter describes the version/tag used for a release — typically applied to a Docker image or deployment artifact"
        required: true
        type: string
      Environment:
        description: "The environment to deploy to."
        required: true
        type: string
  workflow_dispatch:
     inputs:
      FilePath:
        required: true
        type: string
      DockerImageName:
        required: true
        type: string
      ReleaseTag:
        required: true
        type: string
      Environment:
        description: "The environment to deploy to."
        required: true
        type: choice
        options:
          - tce-dip-acc
          - tce-dip-prd

env:
  REGISTRY: ghcr.io
  ChekinDescription: "Deployment of ${{inputs.DockerImageName}}."
  
  # Approval needed from a user when pr is created main branch.
  Environment: ${{ inputs.Environment }}

permissions:
  contents: write  # needed to push commits
  actions: write  # needed to create PRs
  pull-requests: write

concurrency:
  group: deploy-${{ inputs.Environment }}-${{ inputs.DockerImageName }}
  cancel-in-progress: false

jobs:
 get-current-image-tag:
    runs-on: ubuntu-latest
    outputs:
      currentTag: ${{ steps.get_current_tag.outputs.currentTag }}
    steps:
      - name: Checkout repo.
        uses: actions/checkout@v4
      - name: Get the current image tag from the file.
        id: get_current_tag
        shell: bash
        run: |
          set -euo pipefail
          echo "Extracting current tag for image ${{inputs.DockerImageName}} in file ${{inputs.FilePath}}"
          currentTag=$(git grep -hoP "${{inputs.DockerImageName}}:\K[^ ]+" "${{inputs.FilePath}}")
          echo "currentTag=$currentTag" >> $GITHUB_OUTPUT

 edit-image-tag-and-commit-acc:
    if: ${{ inputs.Environment == 'tce-dip-acc' }}
    needs: get-current-image-tag
    runs-on: ubuntu-latest
    steps:
      # Login to github container registry
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Checkout the repository to access the files that need to be updated.
      - name: Checkout repo.
        uses: actions/checkout@v4

      #- name: Get the current image tag from the file.
      #  id: get_current_tag
      #  shell: bash
      #  run: |
      #    set -euo pipefail
      #    echo "Extracting current tag for image ${{inputs.DockerImageName}} in file ${{inputs.FilePath}}"
      #    currentTag=$(git grep -hoP "${{inputs.DockerImageName}}:\K[^ ]+" "${{inputs.FilePath}}")
      #    echo "currentTag=$currentTag" >> $GITHUB_OUTPUT

      # The git grep command searches for the specified Docker image name followed by a colon and captures the tag (version) that follows it.
      - name: Find matching DockerImageName in the given file and change image tag.
        id: update-image-tag
        shell: bash
        run: |
          set -euo pipefail
             echo "Update image tag in file [ ${{inputs.FilePath}} ]"
             echo "Current tag : ${{ needs.get-current-image-tag.outputs.currentTag }} with : ${{inputs.ReleaseTag}}"
             # Update the tag to the new release tag using sed.
             sed -i "s/\(${{inputs.DockerImageName}}:\).*/\1${{inputs.ReleaseTag}}/" "${{inputs.FilePath}}"

      - name: Commit and push changes.
        shell: bash
        run: |
          git add "${{ inputs.FilePath }}"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git config pull.ff only
          git pull origin main
          git commit -a -m "${{env.ChekinDescription}}" -m "Updates image tag from : ${{ needs.get-current-image-tag.outputs.currentTag }}" to  '${{inputs.ReleaseTag}}.'" || echo "No changes to commit"
          git push origin main          

 edit-image-tag-and-commit-prd:
    if: ${{ inputs.Environment == 'tce-dip-prd' }}
    needs: get-current-image-tag
    runs-on: ubuntu-latest
    steps:
      # Login to github container registry
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Checkout the repository to access the files that need to be updated.
      - name: Checkout repo.
        uses: actions/checkout@v4

      - name: Create deployment branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          BRANCH="automation/gitops-${{ github.workflow }}-${{ github.run_id }}"
      
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          git push origin "$BRANCH"

      #- name: Get the current image tag from the file.
      #  id: get_current_tag
      #  shell: bash
      #  run: |
      #    set -euo pipefail
      #    echo "Extracting current tag for image ${{inputs.DockerImageName}} in file ${{inputs.FilePath}}"
      #    currentTag=$(git grep -hoP "${{inputs.DockerImageName}}:\K[^ ]+" "${{inputs.FilePath}}")
      #    echo "currentTag=$currentTag" >> $GITHUB_OUTPUT

      # The git grep command searches for the specified Docker image name followed by a colon and captures the tag (version) that follows it.
      - name: Find matching DockerImageName in the given file and change image tag.        
        id: update-image-tag
        shell: bash
        run: |
          set -euo pipefail
          FILE="${{ inputs.FilePath }}"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: File not found: $FILE"
            exit 1
          fi

          echo "Update image tag in file [ ${{inputs.FilePath}} ]"
          echo "Current tag : ${{ needs.get-current-image-tag.outputs.currentTag }}" with : ${{inputs.ReleaseTag}}"
          # Update the tag to the new release tag using sed.
          sed -i "s/\(${{inputs.DockerImageName}}:\).*/\1${{inputs.ReleaseTag}}/" "${{inputs.FilePath}}"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        id: create_pr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "main"
          branch: "automation/gitops-${{ github.workflow }}-${{ github.run_id }}"
          delete-branch: true
          commit-message: ${{env.ChekinDescription}}"
          title: "GitOps: Update image tag to ${{ inputs.ReleaseTag }}, file ${{ inputs.FilePath }}"
          body: |
            Automated GitOps update.

            - File: `${{ inputs.FilePath }}`
            - Image: `${{ inputs.ReleaseTag }}`

            Created by workflow `${{ github.workflow }}` run `${{ github.run_id }}`

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No changes detected; skipping PR."
